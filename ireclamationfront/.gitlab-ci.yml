stages:
  - build
  - deploy

before_script:
  - 'which ssh-agent || (apt-get update -y && apt-get install openssh-client -y)'
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - ssh-keyscan 192.168.1.31 >> ~/.ssh/known_hosts

build_frontend:
  stage: build
  script:
    - npm ci
    - npm run build
    - docker build -t ireclamation-frontend:latest .
  only:
    - master

deploy_frontend:
  stage: deploy
  script:
    - scp -o StrictHostKeyChecking=no Dockerfile gsf2@192.168.1.31:/home/gsf2/ireclamationfront/
    - ssh gsf2@192.168.1.31 "
        cd /home/gsf2/ireclamationfront &&
        docker build -t ireclamation-frontend:latest . &&
        docker stop ireclamation-frontend || true &&
        docker rm ireclamation-frontend || true &&
        docker run -d --name ireclamation-frontend -p 80:80 ireclamation-frontend:latest
      "
  only:
    - master
